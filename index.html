<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>英语自然语音转换器</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 150px; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #ccc; }
        .controls { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>简易英语朗读器</h2>
    <textarea id="textInput" placeholder="在此粘贴英文段落..."></textarea>
    
    <div class="controls">
        <button id="playBtn">生成并试听</button>
        <audio id="audioPlayer" controls style="display:none;"></audio>
        <a id="downloadBtn" style="display:none; text-decoration: none; color: #28a745; font-weight: bold;">点击下载 MP3</a>
    </div>

    <script>
        const playBtn = document.getElementById('playBtn');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadBtn = document.getElementById('downloadBtn');
        const textInput = document.getElementById('textInput');

        // 【关键！】这里换成你刚才在 Cloudflare 生成的 Worker 地址
        const WORKER_URL = 'https://ttshelp.evanyin.dpdns.org/';

        playBtn.onclick = async () => {
            const text = textInput.value.trim();
            if (!text) return alert("请输入文字");

            playBtn.disabled = true;
            playBtn.innerText = "生成中...";

            // 拼接请求地址
            const finalUrl = `${WORKER_URL}/?text=${encodeURIComponent(text)}`;

            // 更新音频播放器和下载链接
            audioPlayer.src = finalUrl;
            audioPlayer.style.display = "block";
            audioPlayer.play();

            downloadBtn.href = finalUrl;
            downloadBtn.download = "speech.mp3";
            downloadBtn.style.display = "inline";

            playBtn.disabled = false;
            playBtn.innerText = "生成并试听";
        };
    </script>
</body>
</html>
